name: docker-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.3.0). Uses package.json version if empty."
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            ver=$(grep '"version"' package.json | sed 's/.*"version": "\(.*\)",*/\1/')
            echo "tag=$ver" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: selfhost/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            shahriyardx/json-server:${{ steps.version.outputs.tag }}
            shahriyardx/json-server:latest
          push: true
