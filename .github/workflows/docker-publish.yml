name: docker-publish

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v') && !startsWith(github.event.release.tag_name, 'sdk-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          ver=$(grep '"version"' package.json | sed 's/.*"version": "\(.*\)",*/\1/')
          echo "tag=$ver" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: selfhost/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            shahriyardx/json-server:${{ steps.version.outputs.tag }}
            shahriyardx/json-server:latest
          push: true
