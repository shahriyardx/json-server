name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun prisma generate
      - run: bun run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/json_server"
          BETTER_AUTH_SECRET: "ci-secret-do-not-use-in-production"
          BETTER_AUTH_URL: "http://localhost:3000"
          GITHUB_CLIENT_ID: "ci-client-id"
          GITHUB_CLIENT_SECRET: "ci-client-secret"

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub deployment
        id: deployment
        run: |
          DEPLOYMENT=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments \
            -d '{
              "ref": "${{ github.sha }}",
              "environment": "production",
              "auto_merge": false,
              "description": "Deploying to Coolify"
            }')
          echo "id=$(echo $DEPLOYMENT | jq -r '.id')" >> $GITHUB_OUTPUT

      - name: Set deployment pending
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments/${{ steps.deployment.outputs.id }}/statuses \
            -d '{"state": "in_progress", "description": "Deploying to Coolify"}'

      - name: Trigger Coolify deploy
        run: curl -s "${{ secrets.COOLIFY_WEBHOOK_URL }}"

      - name: Mark deployment success
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments/${{ steps.deployment.outputs.id }}/statuses \
            -d '{"state": "success", "description": "Deployed to Coolify"}'

      - name: Mark deployment failure
        if: failure()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments/${{ steps.deployment.outputs.id }}/statuses \
            -d '{"state": "failure", "description": "Deploy to Coolify failed"}'
